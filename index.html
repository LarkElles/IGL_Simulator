<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RazeClan - 队长指挥模拟器 正式版</title>
    <style>
        body {
            background-color: #1a1a1d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #game-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            gap: 20px;
        }
        #sidebar {
            width: 35%;
            background-color: #2d2d30;
            padding: 15px;
            border-radius: 8px;
            border-top: 4px solid #ff4655;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #fltv-panel {
            background-color: #1e262c;
            padding: 12px;
            border-radius: 5px;
            font-size: 0.9em;
            border-left: 3px solid #2b5278;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .fltv-title {
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 8px;
            font-size: 1.1em;
            display: flex;
            justify-content: space-between;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            align-items: center;
        }
        .schedule-box {
            background-color: #1a2025;
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
            border-left: 2px solid #e6a822;
        }
        .schedule-item {
            font-size: 0.85em;
            margin-top: 3px;
            display: flex;
            justify-content: space-between;
        }
        .rating-badge {
            background-color: #2b2b2d;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-weight: bold;
        }
        .player-card {
            background-color: #3e3e42;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .player-name {
            font-weight: bold;
            color: #ff4655;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .affection-bar {
            height: 8px;
            background-color: #1a1a1d;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }
        .affection-fill {
            height: 100%;
            background-color: #00ff7f;
            transition: width 0.3s;
        }
        #main-screen {
            width: 65%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #story-box {
            background-color: #2d2d30;
            padding: 30px;
            border-radius: 8px;
            min-height: 250px;
            font-size: 1.1em;
            line-height: 1.6;
            border-top: 4px solid #00bfff;
            position: relative;
        }
        #speaker-name {
            font-weight: bold;
            color: #00bfff;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        #choices-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            background-color: #3e3e42;
            color: white;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
            text-align: left;
        }
        .choice-btn:hover {
            background-color: #4e4e52;
            border-color: #ff4655;
        }
        .dice-log {
            color: #e6a822;
            font-style: italic;
            background: rgba(230, 168, 34, 0.1);
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            border-left: 3px solid #e6a822;
        }
        @media (max-width: 768px) {
            #game-container {
                flex-direction: column;
            }
            #sidebar, #main-screen {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sidebar">
        <div id="fltv-panel"></div>
        <div>
            <h3 style="margin-top: 0; margin-bottom: 10px;">队伍状态面板</h3>
            <div id="roster"></div>
        </div>
    </div>

    <div id="main-screen">
        <div id="story-box">
            <div id="speaker-name">系统提示</div>
            <div id="story-text">加载中...</div>
        </div>
        <div id="choices-box"></div>
    </div>
</div>

<script>
    // ---------------- 核心数据引擎 ----------------
    let gameStatus = {
        date: "2022-01-08",
        arsRanking: 11,
        captainAge: 32, 
        teamBasePower: 75, 
        // 2022真实赛程追踪
        schedules: [
            { name: "Plast(BLAST) 春季小组赛", status: "准备中", date: "1月28日-2月6日" },
            { name: "卡托维兹(Katowice) 2022", status: "未获得资格", date: "2月15日-2月27日" }
        ]
    };

    let team = {
        nain: { name: "nain (突破)", affection: 50, rating: 1.08, desc: "老搭档，不爱训练但天赋异禀。" },
        pocky: { name: "pocky (狙击)", affection: 50, rating: 1.16, desc: "上下限差距极大的激进狙击手。" },
        porz: { name: "porz (自由人)", affection: 50, rating: 1.19, desc: "新加入的世界级自由人，训练狂魔。" },
        twiztss: { name: "twiztss (辅助)", affection: 50, rating: 1.05, desc: "万能辅助手，温柔的气氛组。" }
    };

    let captainStats = { rating: 0.99, condition: "良好" };

    // ---------------- UI 渲染引擎 ----------------
    function getRatingColor(rating) {
        if (rating >= 1.10) return '#00ff7f';
        if (rating >= 1.00) return '#ffffff';
        return '#ff4655';
    }

    function updateFLTV() {
        const fltvDiv = document.getElementById('fltv-panel');
        
        // 动态生成赛程列表HTML
        let scheduleHtml = "";
        gameStatus.schedules.forEach(item => {
            let statusColor = item.status === "进行中" ? "#00ff7f" : (item.status === "准备中" ? "#e6a822" : "#888");
            scheduleHtml += `
                <div class="schedule-item">
                    <span style="color:#eee;">${item.name}</span>
                    <span style="color:${statusColor}; font-size:0.9em;">[${item.status}]</span>
                </div>
                <div style="font-size:0.75em; color:#666; margin-bottom:4px;">赛期: ${item.date}</div>
            `;
        });

        fltvDiv.innerHTML = `
            <div class="fltv-title">
                <span>📊 FLTV 实时数据</span>
                <span style="color:#aaa; font-size: 0.8em; font-weight:normal;">${gameStatus.date}</span>
            </div>
            <div class="stat-row"><span>ARS 世界排名:</span> <strong style="color: gold;">#${gameStatus.arsRanking}</strong></div>
            <div class="schedule-box">
                <div style="font-size: 0.8em; color: #aaa; margin-bottom:4px;">赛事日程面板:</div>
                ${scheduleHtml}
            </div>
            <hr style="border-color: #3e3e42; margin: 10px 0;">
            <div style="font-size: 0.85em; color: #aaa; margin-bottom: 5px;">本赛季 Rating 2.0:</div>
            <div class="stat-row">
                <span>carrycan (你 | ${gameStatus.captainAge}岁)</span> 
                <span class="rating-badge" style="color: ${getRatingColor(captainStats.rating)}">${captainStats.rating}</span>
            </div>
            <div class="stat-row"><span>nain</span> <span class="rating-badge" style="color: ${getRatingColor(team.nain.rating)}">${team.nain.rating}</span></div>
            <div class="stat-row"><span>pocky</span> <span class="rating-badge" style="color: ${getRatingColor(team.pocky.rating)}">${team.pocky.rating}</span></div>
            <div class="stat-row"><span>porz</span> <span class="rating-badge" style="color: ${getRatingColor(team.porz.rating)}">${team.porz.rating}</span></div>
            <div class="stat-row"><span>twiztss</span> <span class="rating-badge" style="color: ${getRatingColor(team.twiztss.rating)}">${team.twiztss.rating}</span></div>
        `;
    }

    function updateSidebar() {
        const rosterDiv = document.getElementById('roster');
        rosterDiv.innerHTML = '';
        for (let key in team) {
            let p = team[key];
            rosterDiv.innerHTML += `
                <div class="player-card">
                    <div class="player-name">${p.name}</div>
                    <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">${p.desc}</div>
                    <div style="font-size: 0.8em;">好感度: ${p.affection}</div>
                    <div class="affection-bar">
                        <div class="affection-fill" style="width: ${p.affection}%; background-color: ${p.affection >= 80 ? '#00bfff' : (p.affection <= 30 ? '#ff4655' : '#00ff7f')}"></div>
                    </div>
                </div>
            `;
        }
    }

    // ---------------- TRPG 掷骰逻辑 ----------------
    function executeRoll(rollConfig) {
        let d100 = Math.floor(Math.random() * 100) + 1;
        let totalScore = d100 + gameStatus.teamBasePower + rollConfig.tacticalBonus;
        let isSuccess = totalScore >= rollConfig.dc;

        let logHtml = `
            <div class="dice-log">
                <strong>[TRPG判定]</strong> ${rollConfig.desc}<br>
                基础实力(${gameStatus.teamBasePower}) + 战术加成(${rollConfig.tacticalBonus}) + D100掷骰(${d100}) = <strong>总值 ${totalScore}</strong><br>
                对抗难度阈值 DC ${rollConfig.dc} ... 
                <span style="color: ${isSuccess ? '#00ff7f' : '#ff4655'}; font-weight: bold;">
                    ${isSuccess ? '判定成功！' : '判定失败！'}
                </span>
            </div>
        `;

        return { success: isSuccess, log: logHtml, nextNode: isSuccess ? rollConfig.successNext : rollConfig.failNext };
    }

    // ---------------- 剧情剧本 ----------------
    const storyNodes = {
        start: {
            speaker: "系统旁白",
            text: "你叫 carrycan，1990年4月14日出生。今天是2022年1月8日，休假后的第一天训练日。队伍刚刚发生人员变动：世界级自由人 porz 正式替换了 hoverboarder 加入了 RazeClan。<br><br>你们将在1月31日参加 Plast 春季赛（目前处于准备中状态）。目前队伍的 ARS 排名为 #11，外界对你们这套新阵容充满了审视。<br><br>你走进训练室，porz 正坐在他的新位置上，用他的卷尺调试外设。其他三人也陆续到了。",
            choices: [
                { 
                    text: "【温和老登】走上前拍拍手：“伙计们，让我们欢迎新成员 porz 的加入！”", 
                    // 【关键更新】：支持数组配置，最多可填4人好感度
                    effects: [
                        { player: 'twiztss', val: 5 },
                        { player: 'porz', val: 5 },
                    ], 
                    next: "scene_welcome_warm" 
                },
                { 
                    text: "【严厉老登】点点头：“人都到齐了就上号，今天直接打两场训练赛，我要根据情况调整你们负责的位置。porz 会极大程度地增厚我们的战术本。”", 
                    effects: [
                        { player: 'porz', val: 5 }
                    ], 
                    next: "scene_welcome_strict" 
                },
                { 
                    text: "【放权老登】“nain，带 porz 熟悉一下我们的基础战术，我先去喝口咖啡。”", 
                    effects: [
                        { player: 'nain', val: 5 }
                    ], 
                    next: "scene_welcome_lazy" 
                }
            ]
        },
        scene_welcome_warm: {
            speaker: "twiztss",
            text: "（立刻鼓起掌来）欢迎兄弟！我是Fuss，这是Nelvijs，（转过身戳了戳pocky）“快和新成员打个招呼，他和你都是波罗的海人欸！”（pocky懒洋洋地哼唧了一声，含糊不清地打了个招呼。twiztss又转过身）我以前就听说你很厉害了！我已经准备好被推向另一个高度了！<br><br>porz 只是微微推了一下眼镜，点了点头，耳尖微微泛红：“谢谢。我们什么时候开始跑图？”",
            choices: [{ text: "准备进行首次队内训练...", next: "scene_first_scrim" }]
        },
        scene_welcome_strict: {
            speaker: "porz",
            text: "（眼神中闪过一丝认同）没问题。我已经研究过你们前两个月的Demo了，在 Inferno 的二楼控制上有些想法，等下可以试试。",
            choices: [{ text: "准备进行首次队内训练...", next: "scene_first_scrim" }]
        },
        scene_welcome_lazy: {
            speaker: "nain",
            text: "（喝了一口酒红色的可乐）行吧。欢迎来到Raze，Motherfucker。",
            choices: [{ text: "准备进行首次队内训练...", next: "scene_first_scrim" }]
        },
        
        scene_first_scrim: {
            speaker: "carrycan (你)",
            text: "今天我们约了 ARS 排名 #18 的队伍打训练赛。这是 porz 加入后的首秀。作为指挥，你打算采用什么战术基调？",
            choices: [
                { 
                    text: "【战术：主打稳健】让 porz 按照他最舒服的节奏单摸，其他人默认控图。（战术加成 +10）", 
                    isRoll: true,
                    roll: { desc: "指挥稳健战术测试", tacticalBonus: 10, dc: 120, successNext: "scrim_win", failNext: "scrim_lose" }
                },
                { 
                    text: "【战术：提速冲锋】利用 nain 的突破能力，强行拉开空间。（战术加成 +5，但更看运气）", 
                    isRoll: true,
                    roll: { desc: "指挥提速战术测试", tacticalBonus: 5, dc: 110, successNext: "scrim_win", failNext: "scrim_lose" }
                },
                { 
                    text: "【战术：赌博式狙击】围绕 pocky 展开，让他去拿首杀建立开局优势。（战术加成 +0，极高风险）", 
                    isRoll: true,
                    roll: { desc: "指挥抽奖战术测试", tacticalBonus: 0, dc: 100, successNext: "scrim_win_pocky", failNext: "scrim_lose_pocky" }
                }
            ]
        },

        scrim_win: {
            speaker: "系统旁白",
            text: "训练赛以 16-10 拿下。porz 完美融入了节奏，他的残局处理极其合理。nain 笑着拍了拍手说：“看来新赛季我们有戏啊。”",
            choices: [{ text: "继续休赛期备战...", next: "start" }] 
        },
        scrim_lose: {
            speaker: "系统旁白",
            text: "训练赛 11-16 落败。与新成员的沟通出现了严重失误。porz 皱着眉头开始在战术册上记录着什么，而 twiztss 赶紧来语音里安慰你：“没事没事，第一天嘛，慢慢磨合，我觉得我们在 CT 方的表现很不错。”",
            choices: [{ text: "反思战术，重新构思...", next: "start" }]
        },
        scrim_win_pocky: {
            speaker: "pocky",
            text: "（得意地摸了摸鼻子）",
            effects: [
                        { player: 'pocky', val: 10 },
                        { player: 'porz', val: -5 },
                    ], 
            choices: [{ text: "称赞他并继续备战...", next: "start" }]
        },
        scrim_lose_pocky: {
            speaker: "pocky",
            text: "（皱着眉摸了摸鼻子）",
            effects: [
                        { player: 'pocky', val: -15 },
                        { player: 'porz', val: -5 },
                    ], 
            choices: [{ text: "赶紧去安慰或者指导...", next: "start" }]
        }
    };

    let currentNode = "start";

    function renderNode(nodeId, previousLog = "") {
        const node = storyNodes[nodeId];

        document.getElementById('speaker-name').innerText = node.speaker;
        document.getElementById('story-text').innerHTML = previousLog + node.text;

        const choicesBox = document.getElementById('choices-box');
        choicesBox.innerHTML = '';

        node.choices.forEach(choice => {
            let btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            
            btn.onclick = () => {
                // 【核心升级】：遍历好感度修改数组，完美支持1-4人同时加减分
                if (choice.effects && Array.isArray(choice.effects)) {
                    choice.effects.forEach(eff => {
                        if (team[eff.player]) {
                            team[eff.player].affection += eff.val;
                            // 限制上下限在 0 - 100 之间
                            if (team[eff.player].affection > 100) team[eff.player].affection = 100;
                            if (team[eff.player].affection < 0) team[eff.player].affection = 0;
                        }
                    });
                }

                updateSidebar();
                updateFLTV();

                if (choice.isRoll) {
                    let rollResult = executeRoll(choice.roll);
                    renderNode(rollResult.nextNode, rollResult.log);
                } else {
                    renderNode(choice.next);
                }
            };
            choicesBox.appendChild(btn);
        });
    }

    // 初始化运行
    updateFLTV();
    updateSidebar();
    renderNode(currentNode);
</script>

</body>
</html>
