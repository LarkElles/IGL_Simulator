<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RazeClan - carrycan模拟器</title>
    <style>
        body {
            background-color: #1a1a1d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #game-container {
            width: 100%;
            max-width: 950px;
            display: flex;
            gap: 20px;
        }
        /* 左侧面板：好感度与属性 */
        #sidebar {
            width: 30%;
            background-color: #2d2d30;
            padding: 15px;
            border-radius: 8px;
            border-top: 4px solid #ff4655;
            display: flex;
            flex-direction: column;
            gap: 15px; /* 面板之间的间距 */
        }
        
        /* FLTV 数据面板样式 */
        #fltv-panel {
            background-color: #1e262c; /* 类似HLTV的深蓝色调 */
            padding: 12px;
            border-radius: 5px;
            font-size: 0.9em;
            border-left: 3px solid #2b5278;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .fltv-title {
            font-weight: bold;
            color: #4a90e2;
            margin-bottom: 8px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            align-items: center;
        }
        .map-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 5px;
            font-size: 0.85em;
            color: #ccc;
        }
        .rating-badge {
            background-color: #2b2b2d;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-weight: bold;
        }

        .player-card {
            background-color: #3e3e42;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .player-name {
            font-weight: bold;
            color: #ff4655;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .affection-bar {
            height: 8px;
            background-color: #1a1a1d;
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
        }
        .affection-fill {
            height: 100%;
            background-color: #00ff7f;
            width: 50%;
            transition: width 0.3s;
        }
        /* 右侧面板：剧情与选项 */
        #main-screen {
            width: 70%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #story-box {
            background-color: #2d2d30;
            padding: 30px;
            border-radius: 8px;
            min-height: 250px;
            font-size: 1.1em;
            line-height: 1.6;
            border-top: 4px solid #00bfff;
        }
        #speaker-name {
            font-weight: bold;
            color: #00bfff;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        #choices-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .choice-btn {
            background-color: #3e3e42;
            color: white;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s;
            text-align: left;
        }
        .choice-btn:hover {
            background-color: #4e4e52;
            border-color: #ff4655;
        }
        @media (max-width: 768px) {
            #game-container {
                flex-direction: column;
            }
            #sidebar, #main-screen {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sidebar">
        <div id="fltv-panel">
            </div>

        <div>
            <h3 style="margin-top: 0; margin-bottom: 10px;">队员好感度</h3>
            <div id="roster">
                </div>
        </div>
    </div>

    <div id="main-screen">
        <div id="story-box">
            <div id="speaker-name">系统提示</div>
            <div id="story-text">加载中...</div>
        </div>
        <div id="choices-box">
        </div>
    </div>
</div>

<script>
    // ---------------- 数据区域 ----------------

    // 新增：FLTV 战队及选手数据
    let fltvData = {
        worldRanking: 4,
        totalWinRate: "68.5%",
        mapWinRates: {
            "Mirage": "75%",
            "Inferno": "60%",
            "Nuke": "82%",
            "Ancient": "55%"
        },
        playerRatings: {
            carrycan: 1.02, // 队长你偏向指挥，Rating相对正常
            nain: 1.12,     // 天赋型突破手
            pocky: 1.18,    // 上限极高，均值被下限拉低了一点
            porz: 1.15,     // 稳定高效的老六
            twiztss: 1.08   // 辅助手，脏活累活干得多
        }
    };

    // 玩家数据初始化（好感度初始为50）
    let team = {
        nain: { name: "nain (突破)", affection: 50, desc: "老搭档，脾气好，不爱训练但天赋异禀。" },
        pocky: { name: "pocky (狙击)", affection: 50, desc: "激进狙击手，上限极高下限极低，心态差。" },
        porz: { name: "porz (自由人)", affection: 50, desc: "世界级自由人，极度理智，训练狂魔。" },
        twiztss: { name: "twiztss (辅助)", affection: 50, desc: "万能辅助手，爱憎分明，温柔。" }
    };

    // ---------------- UI 渲染区域 ----------------

    // 获取 Rating 的颜色分类 (类似HLTV的变色)
    function getRatingColor(rating) {
        if (rating >= 1.10) return '#00ff7f'; // 绿色（大腿）
        if (rating >= 1.00) return '#ffffff'; // 白色（及格）
        return '#ff4655'; // 红色（战犯预警）
    }

    // 渲染 FLTV 面板
    function updateFLTV() {
        const fltvDiv = document.getElementById('fltv-panel');
        
        // 拼接地图胜率 HTML
        let mapsHtml = '';
        for (let map in fltvData.mapWinRates) {
            // 如果胜率低于 60%，显示红色警示，否则显示绿色
            let winRateNum = parseInt(fltvData.mapWinRates[map]);
            let rateColor = winRateNum >= 60 ? '#00ff7f' : '#ff4655';
            mapsHtml += `<div>${map}: <span style="color:${rateColor}">${fltvData.mapWinRates[map]}</span></div>`;
        }

        fltvDiv.innerHTML = `
            <div class="fltv-title">📊 FLTV 战队数据</div>
            <div class="stat-row"><span>世界排名:</span> <strong style="color: gold;">#${fltvData.worldRanking}</strong></div>
            <div class="stat-row"><span>近三个月胜率:</span> <strong>${fltvData.totalWinRate}</strong></div>
            <hr style="border-color: #3e3e42; margin: 8px 0;">
            <div style="font-size: 0.85em; color: #aaa;">地图胜率:</div>
            <div class="map-stats">${mapsHtml}</div>
            <hr style="border-color: #3e3e42; margin: 8px 0;">
            <div style="font-size: 0.85em; color: #aaa; margin-bottom: 5px;">选手近三个月 Rating 2.0:</div>
            <div class="stat-row"><span>carrycan(你)</span> <span class="rating-badge" style="color: ${getRatingColor(fltvData.playerRatings.carrycan)}">${fltvData.playerRatings.carrycan}</span></div>
            <div class="stat-row"><span>pocky</span> <span class="rating-badge" style="color: ${getRatingColor(fltvData.playerRatings.pocky)}">${fltvData.playerRatings.pocky}</span></div>
            <div class="stat-row"><span>porz</span> <span class="rating-badge" style="color: ${getRatingColor(fltvData.playerRatings.porz)}">${fltvData.playerRatings.porz}</span></div>
            <div class="stat-row"><span>nain</span> <span class="rating-badge" style="color: ${getRatingColor(fltvData.playerRatings.nain)}">${fltvData.playerRatings.nain}</span></div>
            <div class="stat-row"><span>twiztss</span> <span class="rating-badge" style="color: ${getRatingColor(fltvData.playerRatings.twiztss)}">${fltvData.playerRatings.twiztss}</span></div>
        `;
    }

    // 更新好感度 UI
    function updateSidebar() {
        const rosterDiv = document.getElementById('roster');
        rosterDiv.innerHTML = '';
        for (let key in team) {
            let p = team[key];
            rosterDiv.innerHTML += `
                <div class="player-card">
                    <div class="player-name">${p.name}</div>
                    <div style="font-size: 0.8em; color: #aaa;">${p.desc}</div>
                    <div style="margin-top: 5px;">好感度: ${p.affection}</div>
                    <div class="affection-bar">
                        <div class="affection-fill" style="width: ${p.affection}%"></div>
                    </div>
                </div>
            `;
        }
    }

    // ---------------- 剧情引擎 ----------------

    const storyNodes = {
        start: {
            speaker: "系统旁白",
            text: "你是 carrycan，RazeClan 的指挥兼队长。距离Major的预选赛还有最后两天。你推开训练室的门，看到你的四个队友正形态各异地待在里面。<br><br>nain 正在一边喝着咖啡一边看搞笑视频；pocky 正在跑图练习丢道具，但似乎又呲了一颗烟雾弹；porz 正在面无表情地记录着什么；twiztss 则在帮大家整理桌上的外卖垃圾。",
            choices: [
                { text: "拍拍手，引起大家注意，准备开始训练。", next: "scene_meeting" }
            ]
        },
        scene_meeting: {
            speaker: "carrycan (你)",
            text: "伙计们，该收心了，准备开始今天的跑图和战术推演。看看我们 FLTV 上的 Ancient 胜率，都快跌破 50% 了。",
            choices: [
                { text: "继续...", next: "scene_nain_joke" }
            ]
        },
        scene_nain_joke: {
            speaker: "nain",
            text: "（放下高脚杯，笑嘻嘻地看着你）别这么紧张嘛。放轻松，大不了我们再经历一次四年前那种惨败。对了，要不要现在开个投票，看看有几个人想把你踢了？我先投赞成票哈！",
            choices: [
                { text: "【开玩笑回应】这次你可没机会了，因为我会先把你按在冷板凳上。", effect: { player: 'nain', val: 5 }, next: "scene_nain_laugh" },
                { text: "【严肃回应】四年前的教训还不够吗？别玩梗了，集中注意力。", effect: { player: 'nain', val: -5 }, next: "scene_nain_serious" }
            ]
        },
        scene_nain_laugh: {
            speaker: "nain",
            text: "哈哈哈！谁知道咱俩谁先滚蛋呢。",
            choices: [{ text: "看向正在练道具的pocky...", next: "scene_pocky_nade" }]
        },
        scene_nain_serious: {
            speaker: "nain",
            text: "（耸耸肩）好吧好吧，大指挥官发话了。我上号就是了。",
            choices: [{ text: "看向正在练道具的pocky...", next: "scene_pocky_nade" }]
        },
        scene_pocky_nade: {
            speaker: "系统旁白",
            text: "你注意到屏幕那头的 pocky 眉头紧锁。他刚刚尝试扔一颗复杂的VIP单向烟，结果烟雾弹弹到了门框上，把自己给封了个严实。旁边的 porz 看了一眼，推了一下眼镜，虽然没说话，但眼神里闪过一丝无奈。",
            choices: [
                { text: "【鼓励pocky】想法很清奇！这颗烟如果成了绝对能打 Zimble 一个出其不意，再试几次找找参照物。", effect: { player: 'pocky', val: 10 }, next: "scene_pocky_happy" },
                { text: "【让porz指导】porz，你教教他这颗烟的合理点位。实战里可不能这么失误。", effect: { player: 'porz', val: 5, player2: 'pocky', val2: -5 }, next: "scene_porz_teach" }
            ]
        },
        scene_pocky_happy: {
            speaker: "pocky",
            text: "（眼神亮了一下，摸了摸下巴上的胡渣）哼，刚刚只是鼠标滑了。下次肯定没问题。",
            choices: [{ text: "此时twiztss走了过来...", next: "scene_twiztss_support" }]
        },
        scene_porz_teach: {
            speaker: "porz",
            text: "（冷淡地开口）你的准星高了两个像素。比赛里容错率很低，建议你用更常规的丢法，别总搞些花里胡哨的。",
            choices: [{ text: "pocky撇了撇嘴没说话，此时twiztss走了过来...", next: "scene_twiztss_support" }]
        },
        scene_twiztss_support: {
            speaker: "twiztss",
            text: "（笑着把一瓶水递给你）别太操心了。等下打训练赛要不要试试我新想出来的战术？用在场馆淘汰赛的话效果应该还不错。",
            choices: [
                { text: "【温柔回应】多谢了老弟，有你帮我分担真好。", effect: { player: 'twiztss', val: 10 }, next: "scene_end_good" },
                { text: "【严肃拒绝】按我的规定来，别破坏战术本，做好你该做的。", effect: { player: 'twiztss', val: -10 }, next: "scene_end_bad" }
            ]
        },
        scene_end_good: {
            speaker: "twiztss",
            text: "哈哈，那必须的！走，让我们去给那些陪练队伍上点强度！",
            choices: [
                { text: "【试玩版结束】你成功拉进了团队距离，点击重置剧情。", next: "start", reset: true }
            ]
        },
        scene_end_bad: {
            speaker: "twiztss",
            text: "（笑容僵住，收回手）...行吧，你是队长，听你的。",
            choices: [
                { text: "【试玩版结束】气氛有些尴尬，点击重置剧情。", next: "start", reset: true }
            ]
        }
    };

    let currentNode = "start";

    function renderNode(nodeId) {
        const node = storyNodes[nodeId];

        document.getElementById('speaker-name').innerText = node.speaker;
        document.getElementById('story-text').innerHTML = node.text;

        const choicesBox = document.getElementById('choices-box');
        choicesBox.innerHTML = '';

        node.choices.forEach(choice => {
            let btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            
            btn.onclick = () => {
                // 计算好感度增减
                if (choice.effect) {
                    team[choice.effect.player].affection += choice.effect.val;
                    if (team[choice.effect.player].affection > 100) team[choice.effect.player].affection = 100;
                    if (team[choice.effect.player].affection < 0) team[choice.effect.player].affection = 0;
                    if (choice.effect.player2) {
                        team[choice.effect.player2].affection += choice.effect.val2;
                    }
                }

                // 结局重置数据
                if (choice.reset) {
                    team.nain.affection = 50; 
                    team.pocky.affection = 50;
                    team.porz.affection = 50; 
                    team.twiztss.affection = 50;
                    // 在这里你甚至可以写逻辑：如果达成好结局，胜率+1% 之类的玩法
                }

                updateSidebar();
                renderNode(choice.next);
            };
            choicesBox.appendChild(btn);
        });
    }

    // 网页加载完毕后，立刻执行初始化
    updateFLTV();     // 渲染 FLTV 面板
    updateSidebar();  // 渲染好感度面板
    renderNode(currentNode); // 加载第一段剧情
</script>

</body>
</html>
